<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>

<body>
  <!-- Semantyczny HTLM od początku -->
  <header>
    <h1>Kalkulator</h1>
  </header>

  <main>
    <section class="calc-card">
      <h2>Wprowadź działanie</h2>
      <form action="#" onsubmit="return false;">
        <div class="calc-inputs">
          <label for="number-a">Liczba A:</label>
          <input type="text" id="number-a" placeholder="Wpisz liczbę" class="calc-input" aria-label="Liczba A" />
          <!-- ARIA-labels, oddzielny temat dostępność - można poczytać -->

          <label for="number-b">Liczba B:</label>
          <input type="text" id="number-b" placeholder="Wpisz liczbę" class="calc-input" aria-label="Liczba B" />
        </div>

        <div class="calc-buttons">
          <button class="calc-button calc-button-operator" onclick="adder()">+</button>
          <button class="calc-button calc-button-operator">-</button>
          <button class="calc-button calc-button-operator">*</button>
          <button class="calc-button calc-button-operator">/</button>
          <button class="calc-button">7</button>
          <button class="calc-button">8</button>
          <button class="calc-button">9</button>
          <button class="calc-button">4</button>
          <button class="calc-button">5</button>
          <button class="calc-button">6</button>
          <button class="calc-button">1</button>
          <button class="calc-button">2</button>
          <button class="calc-button">3</button>
          <button class="calc-button">0</button>
          <button class="calc-button calc-button-equals">=</button>
        </div>
      </form>
    </section>

    <section class="history-card">
      <h2>Historia</h2>
      <!-- Ten tag "output" nie jest potrzebny, ale jest dobrą praktyką semantyczne HTMLa bo mówi, że TU SĄ WYNIKI -->
      <output>
        <ul id="calc-results">
          <li>2 + 2 = 5</li>
          <li>10 * 3 = 33</li>
          <li>100 / 4 = 25</li>
          <li>15 - 7 = 9</li>
        </ul>
      </output>
    </section>


    <!-- Dialog obsługuje zachowanie modala -->
    <dialog id="calc-modal" class="calc-card">
      <h3>A lub B jest puste</h3>
      <!--
      method="dialog" - auto-magiczny atrybut
      Sprawia że <button type="submit"> wewnątrz
      automatycznie ZAMYKA dialog. Zero JavaScriptu!
    -->
      <form method="dialog">
        <button type="submit" class="calc-button">OK</button>
      </form>
    </dialog>

  </main>
  <!-- sciprt na końcu, przez zamykając </body> -->
  <script src="./script.js"></script>


</body>

</html>
